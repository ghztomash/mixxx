# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Debian packages

on:
  push:
    tags:
      - "[0-9].[0-9].[0-9]"
      - "[0-9].[0-9]-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Ubuntu 24.04 ${{ matrix.name }} DEB
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-24.04
            deb_arch: amd64
            cache_id: qt6-amd64
            artifact_name: mixxx-ubuntu-24.04-amd64-deb
          - name: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            cache_id: qt6-arm64
            artifact_name: mixxx-ubuntu-24.04-arm64-deb

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure all tags are fetched
        run: git fetch origin --force --tags

      - name: Free up disk space
        run: |
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift

      - name: Install build dependencies
        run: tools/debian_buildenv.sh setup

      - name: Set up ccache cache
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ccache
          key: ${{ runner.os }}-${{ matrix.cache_id }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.cache_id }}-${{ github.ref_name }}
            ${{ runner.os }}-${{ matrix.cache_id }}

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --max-size=2G

      - name: Create build directory
        run: mkdir build

      - name: Configure
        run: >-
          cmake
          -DQT6=ON
          -DQML=ON
          -DBULK=ON
          -DFFMPEG=ON
          -DLOCALECOMPARE=ON
          -DMAD=ON
          -DMODPLUG=ON
          -DWAVPACK=ON
          -DINSTALL_USER_UDEV_RULES=OFF
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DWARNINGS_FATAL=ON
          -DDEBUG_ASSERTIONS_FATAL=OFF
          -DBATTERY=ON
          -DBROADCAST=ON
          -DDOWNLOAD_MANUAL=ON
          -DHID=ON
          -DKEYFINDER=ON
          -DLILV=ON
          -DOPUS=ON
          -DQTKEYCHAIN=ON
          -DVINYLCONTROL=ON
          -DCMAKE_VERBOSE_MAKEFILE=OFF
          -L
          ..
        working-directory: build

      - name: Build
        run: cmake --build . --config RelWithDebInfo
        working-directory: build
        env:
          CCACHE_NOCOMPRESS: true

      - name: Print ccache stats
        run: |
          ccache --show-stats
          ccache --cleanup

      - name: Package
        run: cpack -G DEB -V
        working-directory: build

      - name: Validate package architecture
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(build/*.deb)
          if [[ ${#debs[@]} -ne 1 ]]; then
            printf 'Expected exactly one .deb, found %s\n' "${#debs[@]}"
            printf '%s\n' "${debs[@]}"
            exit 1
          fi
          arch=$(dpkg-deb --field "${debs[0]}" Architecture)
          if [[ "$arch" != "${{ matrix.deb_arch }}" ]]; then
            printf 'Expected Architecture %s, got %s\n' "${{ matrix.deb_arch }}" "$arch"
            exit 1
          fi
          sha256sum "${debs[0]}" > build/SHA256SUMS

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/*.deb
            build/SHA256SUMS
