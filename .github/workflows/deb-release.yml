# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Debian packages

on:
  push:
    tags:
      - "[0-9].[0-9].[0-9]"
      - "[0-9].[0-9]-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }} DEB
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container }}
    env:
      CC: /usr/bin/gcc-13
      CXX: /usr/bin/g++-13
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      DEBIAN_FRONTEND: noninteractive
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 13 arm64
            runner: ubuntu-24.04-arm
            container: debian:trixie
            deb_arch: arm64
            cache_id: debian-trixie-arm64
            artifact_name: mixxx-debian-13-arm64-deb

    steps:
      - name: Prepare Debian container
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates g++-13 gcc-13 git sudo xz-utils zstd
          if [ -f /etc/apt/sources.list.d/debian.sources ]; then
            sed -i -E 's/Components: main$/Components: main contrib non-free non-free-firmware/' /etc/apt/sources.list.d/debian.sources
          fi
          apt-get update

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Ensure all tags are fetched
        run: git fetch origin --force --tags

      - name: Install build dependencies
        run: tools/debian_buildenv.sh setup

      - name: Set up ccache cache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.cache_id }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.cache_id }}-${{ github.ref_name }}
            ${{ runner.os }}-${{ matrix.cache_id }}

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --max-size=2G

      - name: Create build directory
        run: mkdir build

      - name: Configure
        run: >-
          cmake
          -DQT6=ON
          -DQML=ON
          -DBULK=ON
          -DFFMPEG=ON
          -DLOCALECOMPARE=ON
          -DMAD=ON
          -DMODPLUG=ON
          -DWAVPACK=ON
          -DINSTALL_USER_UDEV_RULES=OFF
          -DCMAKE_C_COMPILER=/usr/bin/gcc-13
          -DCMAKE_CXX_COMPILER=/usr/bin/g++-13
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DWARNINGS_FATAL=ON
          -DDEBUG_ASSERTIONS_FATAL=OFF
          -DBATTERY=OFF
          -DBROADCAST=OFF
          -DDOWNLOAD_MANUAL=OFF
          -DHID=ON
          -DKEYFINDER=OFF
          -DLILV=ON
          -DOPUS=ON
          -DQTKEYCHAIN=OFF
          -DVINYLCONTROL=ON
          -DSTEM=OFF
          -DBUILD_TESTING=OFF
          -DBUILD_BENCH=OFF
          -DCMAKE_VERBOSE_MAKEFILE=OFF
          -L
          ..
        working-directory: build

      - name: Build
        run: cmake --build . --config RelWithDebInfo
        working-directory: build
        env:
          CCACHE_NOCOMPRESS: true

      - name: Print ccache stats
        run: |
          ccache --show-stats
          ccache --cleanup

      - name: Package
        run: cpack -G DEB -V
        working-directory: build

      - name: Validate package architecture
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(build/*.deb)
          if [[ ${#debs[@]} -ne 1 ]]; then
            printf 'Expected exactly one .deb, found %s\n' "${#debs[@]}"
            printf '%s\n' "${debs[@]}"
            exit 1
          fi
          arch=$(dpkg-deb --field "${debs[0]}" Architecture)
          if [[ "$arch" != "${{ matrix.deb_arch }}" ]]; then
            printf 'Expected Architecture %s, got %s\n' "${{ matrix.deb_arch }}" "$arch"
            exit 1
          fi
          sha256sum "${debs[0]}" > build/SHA256SUMS

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/*.deb
            build/SHA256SUMS
